<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用下载跳转中...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
            width: 80%;
            max-width: 400px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        #status {
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h3 id="device-name">正在检测设备...</h3>
        <p id="status">如果没有自动跳转，请点击下方按钮。</p>
        <div id="wechat-tip" style="display:none;color:#d9534f;font-weight:bold;margin-bottom:20px;">请点击右上角“···”选择“在浏览器中打开”以继续下载或安装应用。</div>
        <button onclick="manualDownload()" class="btn">点击下载 / 打开应用商店</button>
    </div>

    <script>
        // 定义各应用商店的链接
        const links = {
            huawei: "appmarket://details?id=com.yiqi.highlights",
            honor: "appmarket://details?id=com.yiqi.highlights", 
            xiaomi: "mimarket://details?id=com.yiqi.highlights",
            oppo: "oppomarket://details?packagename=com.yiqi.highlights",
            vivo: "vivomarket://details?id=com.yiqi.highlights",
            default: "https://link.vvstc.com/index.html?id=com.yiqi.highlights" 
        };

        var ua = navigator.userAgent.toLowerCase();
        var targetUrl = links.default;
        var brandName = "通用安卓";

        function isWeChat() {
            return ua.indexOf('micromessenger') > -1;
        }

        function detectAndRedirect() {
            if (isWeChat()) {
                document.getElementById('wechat-tip').style.display = '';
                document.getElementById('status').innerText = '请在浏览器中打开本页面以继续下载或安装应用。';
                document.getElementById('device-name').innerText = '检测到微信内置浏览器';
                return;
            }
            // 1. 小米 
            if (ua.indexOf('xiaomi') > -1 || ua.indexOf('mi u') > -1 || ua.indexOf('redmi') > -1) {
                targetUrl = links.xiaomi;
                brandName = "小米";
            } 
            // 2. OPPO
            else if (ua.indexOf('oppo') > -1 || ua.indexOf('heytap') > -1|| ua.indexOf('oneplus') > -1) {
                targetUrl = links.oppo;
                brandName = "OPPO";
            } 
            // 3. vivo
            else if (ua.indexOf('vivo') > -1) {
                targetUrl = links.vivo;
                brandName = "vivo";
            } 
            // 4. 荣耀 (Honor) 
            else if (ua.indexOf('honor') > -1) {
                targetUrl = links.honor;
                brandName = "荣耀";
            } 
            // 5. 华为 (Huawei)
            else if (ua.indexOf('huawei') > -1) {
                targetUrl = links.huawei;
                brandName = "华为";
            }
            // 6. 其他 (iPhone 或 PC 或 未知安卓)
            else {
                if (ua.indexOf('iphone') > -1 || ua.indexOf('ipad') > -1) {
                    brandName = "iOS设备";
                    targetUrl = "https://apps.apple.com/app/id6756554683"; 
                } else {
                     targetUrl = links.default;
                    brandName = "通用设备";
                }
            }
            document.getElementById('device-name').innerText = "检测到设备： " + brandName;
            
            console.log("Redirecting to: " + targetUrl);
            window.location.href = targetUrl;
        }

        function manualDownload() {
            if (isWeChat()) {
                alert('请点击右上角“···”选择“在浏览器中打开”以继续下载或安装应用。');
                return;
            }
            window.location.href = targetUrl;
        }

        window.onload = function() {
            setTimeout(detectAndRedirect, 500);
        };
    </script>
</body>
</html>
